name: climbing_weather

profile: climbing_weather

seed-paths: ["seeds"]
model-paths: ["models"]
macro-paths: ["macros"]
clean-targets:
  - "target"
  - "dbt_packages"

models:
  climbing_weather:
    +static_analysis: strict
    # Materialize staging models as views, and marts as tables
    staging:
      +materialized: view
    intermediate: 
      +materialized: view
    marts:
      +materialized: table
